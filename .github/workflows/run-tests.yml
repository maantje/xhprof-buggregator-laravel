name: run-tests

on:
  - push
  - pull_request

jobs:
  laravel-10:
    strategy:
      fail-fast: true
      matrix:
        php: [8.1, 8.2, 8.3]
    uses: ./.github/workflows/test-laravel.yml
    with:
      php: ${{ matrix.php }}
      laravel: '10.*'
      testbench: '8.*'
      carbon: '^2.63'
      pest: '^2.36.0'

  laravel-11:
    strategy:
      fail-fast: true
      matrix:
        php: [8.2, 8.3, 8.4]
    uses: ./.github/workflows/test-laravel.yml
    with:
      php: ${{ matrix.php }}
      laravel: '11.*'
      testbench: '9.*'
      carbon: '^2.72'
      pest: '^2.36.0'

  laravel-12:
    strategy:
      fail-fast: true
      matrix:
        php: [8.2, 8.3, 8.4, 8.5]
    uses: ./.github/workflows/test-laravel.yml
    with:
      php: ${{ matrix.php }}
      laravel: '12.*'
      testbench: '10.*'
      carbon: '^3.8.4'
      pest: '^3.7.4'

  laravel-13:
    strategy:
      fail-fast: true
      matrix:
        php: [8.3, 8.4, 8.5]
    uses: ./.github/workflows/test-laravel.yml
    with:
      php: ${{ matrix.php }}
      laravel: '13.*'
      testbench: '11.*'
      carbon: '^3.8.4'
      pest: '^4.4'
